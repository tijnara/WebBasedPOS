name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://pdcnryjqrtfotvfpcqgj.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkY25yeWpxcnRmb3R2ZnBjcWdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE1NzM4NzksImV4cCI6MjA3NzE0OTg3OX0.fJm_5YhmkM-fA8jz_a1oe0y9ks1np3Qg9N-b4pNqmc4"
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30